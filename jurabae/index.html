<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jurabae.com - Website Audit Report</title>
<link rel="icon" type="image/png" href="https://framerusercontent.com/images/eMvSCrBNL2xTrsPYgbmhSfjvGxs.png">
<link rel="apple-touch-icon" href="https://framerusercontent.com/images/eMvSCrBNL2xTrsPYgbmhSfjvGxs.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --surface2: #f0ede6;
    --border: #e2ddd4;
    --text: #1a1916;
    --text2: #6b6760;
    --text3: #9e9b95;
    --red: #c0392b;
    --red-bg: #fdf1f0;
    --amber: #b45309;
    --amber-bg: #fef9ee;
    --green: #2d6a2d;
    --green-bg: #f0f7ee;
    --accent: #1a1916;
  }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    font-size: 14px;
  }

  .page {
    max-width: 860px;
    margin: 0 auto;
    padding: 48px 32px;
  }

  /* ── HEADER ── */
  .report-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 16px 32px;
    border-bottom: 1.5px solid var(--border);
    margin-bottom: 32px;
    background: var(--bg);
  }
  .report-title { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 6px; }
  .report-sub { font-size: 13px; color: var(--text2); }
  .report-meta { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 12px; }
  .chip {
    font-size: 11px; padding: 3px 10px;
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--text2);
    background: var(--surface);
  }
  .overall-score {
    text-align: center;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 16px 24px;
    flex-shrink: 0;
  }
  .overall-score .num { font-size: 36px; font-weight: 600; color: var(--amber); line-height: 1; }
  .overall-score .lbl { font-size: 11px; color: var(--text3); margin-top: 4px; }

  /* ── SCORES ROW ── */
  .scores-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-bottom: 36px;
  }
  .sc {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 10px;
    text-align: center;
  }
  .sc .n { font-size: 22px; font-weight: 600; }
  .sc .l { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .sc.good .n { color: var(--green); }
  .sc.avg .n  { color: var(--amber); }
  .sc.bad .n  { color: var(--red); }

  /* ── SECTION ── */
  .section { margin-bottom: 24px; }
  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px 10px 0 0;
    padding: 14px 18px;
  }
  .section-head.closed { border-radius: 10px; }
  .section-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .section-icon { font-size: 16px; }
  .badge {
    font-size: 11px; font-weight: 500;
    padding: 3px 10px; border-radius: 999px;
  }
  .b-good { background: var(--green-bg); color: var(--green); }
  .b-avg  { background: var(--amber-bg); color: var(--amber); }
  .b-bad  { background: var(--red-bg);   color: var(--red); }

  .section-body {
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 10px 10px;
    background: var(--surface);
    padding: 6px 18px 14px;
  }

  .finding {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
  }
  .finding:last-child { border-bottom: none; }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0; margin-top: 6px;
  }
  .dot-good { background: #2d6a2d; }
  .dot-avg  { background: #b45309; }
  .dot-bad  { background: #c0392b; }
  .finding-content { flex: 1; }
  .finding-title { font-size: 13px; font-weight: 500; color: var(--text); display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
  .finding-desc { font-size: 12px; color: var(--text2); margin-top: 3px; line-height: 1.6; }
  .prio {
    font-size: 10px; font-weight: 600; padding: 1px 7px;
    border-radius: 4px; letter-spacing: 0.3px;
  }
  .p-high { background: var(--red-bg);   color: var(--red); }
  .p-med  { background: var(--amber-bg); color: var(--amber); }
  .p-low  { background: var(--green-bg); color: var(--green); }

  /* ── QUICK WINS ── */
  .quickwins {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    margin-top: 8px;
  }
  .quickwins h3 { font-size: 13px; font-weight: 600; margin-bottom: 14px; color: var(--text); }
  .qw { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 10px; }
  .qw:last-child { margin-bottom: 0; }
  .qw-num {
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
  }
  .qw-n1 { background: var(--red-bg);   color: var(--red); }
  .qw-n2 { background: var(--red-bg);   color: var(--red); }
  .qw-n3 { background: var(--amber-bg); color: var(--amber); }
  .qw-n4 { background: var(--amber-bg); color: var(--amber); }
  .qw-n5 { background: var(--green-bg); color: var(--green); }
  .qw-text { font-size: 13px; color: var(--text); line-height: 1.5; }

  /* ── FOOTER ── */
  .report-footer {
    margin-top: 48px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--text3);
    font-size: 11px;
  }


  /* -- SARVAYA TOP BAR -- */
  .sarvaya-bar {
    background: #111110;
    padding: 0;
    width: 100%;
    position: sticky;
    top: 0;
    z-index: 200;
  }
  .sarvaya-bar-inner {
    max-width: 860px;
    margin: 0 auto;
    padding: 10px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
  }
  .sarvaya-bar-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sarvaya-logo {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    object-fit: cover;
  }
  .sarvaya-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: #ffffff;
    letter-spacing: -0.2px;
  }
  .sarvaya-tag {
    font-size: 11px;
    color: #888;
    border-left: 1px solid #333;
    padding-left: 10px;
    margin-left: 2px;
  }
  .sarvaya-bar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .sarvaya-cta-text {
    font-size: 11px;
    color: #aaa;
  }
  .sarvaya-cta-btn {
    font-size: 11px;
    font-weight: 600;
    color: #111;
    background: #ffffff;
    padding: 5px 14px;
    border-radius: 999px;
    text-decoration: none;
    letter-spacing: 0.2px;
    transition: background 0.2s;
  }
  .sarvaya-cta-btn:hover { background: #e8e8e8; }

  /* -- UPDATED FOOTER -- */
  .report-footer {
    margin-top: 48px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .footer-logo {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    object-fit: cover;
  }
  .footer-brand-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .footer-brand-sub {
    font-size: 11px;
    color: var(--text3);
  }
  .footer-right {
    text-align: right;
  }
  .footer-audit-label {
    font-size: 10px;
    color: var(--text3);
    margin-bottom: 2px;
  }
  .footer-sarvaya-link {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    text-decoration: none;
  }
  .footer-sarvaya-link:hover { text-decoration: underline; }
  .footer-date {
    font-size: 10px;
    color: var(--text3);
    margin-top: 2px;
  }

  @media (max-width: 600px) {
    .sarvaya-bar-inner { flex-direction: column; align-items: flex-start; gap: 10px; }
    .sarvaya-cta-text { display: none; }
  }


  /* -- PAGE SPEED -- */
  .speed-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 14px; }
  .speed-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 12px; text-align: center; }
  .speed-card .s-num { font-size: 26px; font-weight: 700; line-height: 1; }
  .speed-card .s-lbl { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .speed-card .s-tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 999px; display: inline-block; margin-top: 6px; }
  .st-poor { color: var(--red); }
  .st-avg  { color: var(--amber); }
  .st-good { color: var(--green); }
  .stag-poor { background: var(--red-bg); color: var(--red); }
  .stag-avg  { background: var(--amber-bg); color: var(--amber); }
  .stag-good { background: var(--green-bg); color: var(--green); }
  .speed-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .speed-bar-label { font-size: 12px; color: var(--text2); width: 170px; flex-shrink: 0; }
  .speed-bar-track { flex: 1; height: 6px; background: var(--surface2); border-radius: 999px; overflow: hidden; }
  .speed-bar-fill { height: 100%; border-radius: 999px; }
  .bf-poor  { background: var(--red); }
  .bf-avg   { background: var(--amber); }
  .bf-good  { background: var(--green); }
  .speed-bar-val { font-size: 11px; color: var(--text3); width: 40px; text-align: right; flex-shrink: 0; }

  /* -- SERVICES SECTION -- */
  .services-wrap { background: #111110; border-radius: 14px; padding: 28px 28px 24px; margin-bottom: 24px; }
  .services-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
  .services-title { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -0.4px; }
  .services-sub { font-size: 12px; color: #888; margin-top: 4px; }
  .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .svc-card { background: #1e1e1c; border: 1px solid #2e2e2c; border-radius: 10px; padding: 14px 14px 12px; }
  .svc-icon { font-size: 20px; margin-bottom: 8px; }
  .svc-name { font-size: 12px; font-weight: 600; color: #fff; margin-bottom: 4px; }
  .svc-desc { font-size: 11px; color: #888; line-height: 1.5; }
  .svc-tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 999px; display: inline-block; margin-top: 8px; }
  .st-fixes { background: #1a2e1a; color: #6dbf6d; }
  .svc-tagline { font-size: 13px; color: #aaa; border-top: 1px solid #2e2e2c; padding-top: 16px; line-height: 1.6; }
  .svc-tagline strong { color: #fff; }

  /* -- CTA SECTION -- */
  .cta-wrap { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 28px; margin-bottom: 24px; text-align: center; }
  .cta-logo { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; margin: 0 auto 12px; display: block; }
  .cta-headline { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: -0.4px; margin-bottom: 6px; }
  .cta-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; max-width: 480px; margin-left: auto; margin-right: auto; }
  .cta-buttons { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
  .cta-btn-primary { background: #111110; color: #fff; font-size: 13px; font-weight: 600; padding: 10px 24px; border-radius: 999px; text-decoration: none; border: none; cursor: pointer; }
  .cta-btn-secondary { background: transparent; color: var(--text); font-size: 13px; font-weight: 500; padding: 10px 24px; border-radius: 999px; text-decoration: none; border: 1.5px solid var(--border); cursor: pointer; }
  .cta-contact-row { display: flex; justify-content: center; gap: 24px; flex-wrap: wrap; }
  .cta-contact-item { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 5px; }
  .cta-contact-item a { color: var(--text); text-decoration: none; font-weight: 500; }
  .cta-contact-item a:hover { text-decoration: underline; }
  .cta-divider { margin: 16px auto 16px; border: none; border-top: 1px solid var(--border); max-width: 200px; }

  @media print {
    body { background: white; }
    .page { padding: 24px; }
    .section-body { page-break-inside: avoid; }
  }

  @media (max-width: 600px) {
    .scores-row { grid-template-columns: repeat(3, 1fr); }
    .report-header { flex-direction: column; gap: 20px; }
  }
</style>
</head>
